title: "[Q&A] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Ask questions about Claw Compactor, token compression, or LLM cost optimization.
        Check the [FAQ](https://github.com/aeromomo/claw-compactor#faq) first!
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant context (your setup, what you've tried, etc.)
